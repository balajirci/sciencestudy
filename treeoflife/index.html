<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tree of Life - Abhinav IAC Study Guide</title>
<style>
:root{
--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;
--t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;--bd:#30363d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg1);color:var(--t1);font-family:system-ui,sans-serif;font-size:13px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hero{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px 8px;flex-shrink:0}
.hero h1{font-size:18px;font-weight:600;background:linear-gradient(90deg,#a78bfa,#34d399,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:11px;color:var(--t3)}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.tab{padding:8px 13px;font-size:12px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:var(--t1)}
.tab.active{color:#34d399;border-bottom-color:#34d399}
.panel{display:none;flex:1;overflow:hidden;min-height:0}
.panel.active{display:flex;flex-direction:column}
#panel-tree{flex-direction:row !important}
.tree-left{flex:1;overflow-y:auto;overflow-x:auto;padding:10px 12px 20px;min-width:0}
.tree-right{width:320px;flex-shrink:0;border-left:1px solid var(--bd);overflow-y:auto;background:var(--bg2)}
.detail-inner{padding:14px}
.dp-placeholder{color:var(--t3);font-size:12px;text-align:center;padding:40px 16px;line-height:2}
.dp-title{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:2px}
.dp-common{font-size:11px;margin-bottom:6px;font-style:italic;opacity:.8}
.dp-sub{font-size:11px;color:var(--t2);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.dp-key{font-size:11px;border-radius:6px;padding:8px 10px;margin-bottom:8px;line-height:1.5}
.dp-notes{font-size:11px;color:var(--t2);margin-bottom:8px;line-height:1.5}
.dp-ex-label{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.dp-chips{display:flex;flex-wrap:wrap;gap:4px}
.dp-chip{font-size:10px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:2px 7px;color:var(--t2);font-style:italic}
.dp-lineage{margin-top:8px;font-size:10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);border-radius:5px;padding:6px 9px;color:#34d399}
.level-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#c9d1d9;padding:10px 0 5px;margin-top:6px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px}
.level-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.node-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.tnode{border-radius:6px;padding:5px 9px;cursor:pointer;transition:all .15s;border:1px solid transparent;min-width:95px;max-width:190px;user-select:none}
.tnode:hover{filter:brightness(1.3);transform:translateY(-1px)}
.tnode.sel{outline:2px solid #fff;outline-offset:1px}
.tn-name{font-size:11px;font-weight:700;line-height:1.3}
.tn-common{font-size:10px;opacity:.75;line-height:1.2;margin-top:1px}
.tn-ex{font-size:9px;opacity:.5;margin-top:2px;font-style:italic;line-height:1.2}
.tn-path{font-size:8px;background:rgba(52,211,153,.2);color:#34d399;border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block}
.tn-you{font-size:8px;background:rgba(244,114,182,.3);color:#f9a8d4;border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block}
.legend{display:flex;flex-wrap:wrap;gap:4px;padding:6px 0 4px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:2px 7px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.scroll-panel{flex:1;overflow-y:auto;padding:12px 16px 40px}
.fc-wrap{perspective:1000px;margin-bottom:12px}
.flip-card{width:100%;min-height:150px;border-radius:10px;cursor:pointer;transition:transform .45s;transform-style:preserve-3d;position:relative}
.flip-card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:150px;border-radius:10px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 14px;text-align:center}
.card-front{background:var(--bg2);border:1px solid #34d399}
.card-back{background:var(--bg3);border:1px solid #f472b6;transform:rotateY(180deg)}
.fc-q{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:5px}
.fc-h{font-size:11px;color:var(--t3)}
.fc-a{font-size:13px;color:#34d399;font-weight:600;margin-bottom:5px}
.fc-d{font-size:10px;color:var(--t2)}
.row{display:flex;align-items:center;gap:8px;margin-top:8px}
.btn{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:5px 13px;color:var(--t1);cursor:pointer;font-size:12px}
.btn:hover{border-color:#34d399;color:#34d399}
.btn-g{background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399}
.cloze-text{font-size:14px;color:var(--t1);line-height:2.4}
.blank{display:inline-block;min-width:65px;border-bottom:2px solid #34d399;text-align:center;color:#34d399;cursor:pointer;padding:0 4px;font-weight:600}
.blank.rev{border-bottom-color:#a78bfa;color:#a78bfa}
.quiz-q{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:11px;margin-bottom:8px}
.qt{font-size:13px;font-weight:500;margin-bottom:7px}
.qopts{display:flex;flex-direction:column;gap:4px}
.qopt{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:7px 11px;cursor:pointer;font-size:12px;color:var(--t2);text-align:left}
.qopt:hover{border-color:#34d399;color:var(--t1)}
.qopt.ok{background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399}
.qopt.no{background:rgba(244,63,94,.1);border-color:#f43f5e;color:#f43f5e}
.sbar{background:var(--bg3);border-radius:20px;height:4px;overflow:hidden;margin:4px 0 10px}
.sfill{height:100%;background:#34d399;border-radius:20px;transition:width .4s}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:7px}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px}
.mk{font-size:15px;font-weight:700;color:#fbbf24;margin-bottom:3px}
.mb{font-size:11px;color:var(--t2);margin-bottom:5px}
.md{font-size:11px;font-style:italic;color:#34d399;background:var(--bg3);padding:4px 8px;border-radius:4px}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px}
.cc{border-radius:8px;padding:10px;border:1px solid}
.ch{font-size:12px;font-weight:700;margin-bottom:5px}
.cr{font-size:10px;color:var(--t3);margin-bottom:2px}
.cr span{color:var(--t2)}
.cdiv{height:1px;background:var(--bd);margin:5px 0}
.cf{font-size:10px;color:var(--t3);font-style:italic}
.cvbox{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-top:7px;font-size:11px;color:var(--t2)}
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--bd)}
.tli{position:relative;margin-bottom:13px}
.tli::before{content:'';position:absolute;left:-22px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--bg3);border:2px solid var(--t3)}
.tli.key::before{background:#34d399;border-color:#34d399}
.ty{font-size:10px;color:#fbbf24;font-weight:700;margin-bottom:1px}
.te{font-size:12px;color:var(--t1);font-weight:500}
.tn2{font-size:11px;color:var(--t3);margin-top:1px}
.prow{display:flex;align-items:stretch;gap:8px;margin-bottom:4px}
.prank{width:82px;font-size:9px;color:var(--t3);padding-top:9px;text-align:right;flex-shrink:0}
.pline{width:1px;flex-shrink:0;opacity:.5}
.pcard{border-radius:6px;padding:7px 10px;flex:1;border:1px solid}
.pname{font-size:12px;font-weight:700}
.pkey{font-size:10px;color:var(--t2);margin-top:2px;line-height:1.4}
</style>
</head>
<body>
<div id="app">
  <div class="hero">
    <h1>The Tree of Life</h1>
    <div class="hero-sub">Complete Taxonomy &amp; Classification -- Abhinav Grade 9 | IAC Science Bee</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tree',this)">Full Tree</div>
    <div class="tab" onclick="switchTab('path',this)">Your Lineage</div>
    <div class="tab" onclick="switchTab('flash',this)">Flashcards</div>
    <div class="tab" onclick="switchTab('cloze',this)">Fill-in-Blanks</div>
    <div class="tab" onclick="switchTab('quiz',this)">Quiz</div>
    <div class="tab" onclick="switchTab('mnemonics',this)">Mnemonics</div>
    <div class="tab" onclick="switchTab('compare',this)">4-Animal Compare</div>
    <div class="tab" onclick="switchTab('timeline',this)">Evo Timeline</div>
  </div>
  <div id="panel-tree" class="panel active">
    <div class="tree-left">
      <div class="legend" id="legend"></div>
      <div id="tree-root"></div>
    </div>
    <div class="tree-right">
      <div class="detail-inner" id="detail-inner">
        <div class="dp-placeholder">Click any node in the tree<br>to see details here</div>
      </div>
    </div>
  </div>
  <div id="panel-path" class="panel"><div class="scroll-panel" id="path-content"></div></div>
  <div id="panel-flash" class="panel">
    <div class="scroll-panel">
      <div class="fc-wrap">
        <div class="flip-card" id="flipcard" onclick="this.classList.toggle('flipped')">
          <div class="card-face card-front"><div class="fc-q" id="fc-q"></div><div class="fc-h" id="fc-h"></div></div>
          <div class="card-face card-back"><div class="fc-a" id="fc-a"></div><div class="fc-d" id="fc-d"></div></div>
        </div>
      </div>
      <div class="row">
        <button class="btn" onclick="fcNav(-1)">Prev</button>
        <span style="font-size:11px;color:var(--t3)" id="fc-prog">1/25</span>
        <button class="btn" onclick="fcNav(1)">Next</button>
        <button class="btn" onclick="shuffleFC()">Shuffle</button>
        <button class="btn-g btn" onclick="document.getElementById('flipcard').classList.remove('flipped')">Unflip</button>
      </div>
    </div>
  </div>
  <div id="panel-cloze" class="panel">
    <div class="scroll-panel">
      <div class="row" style="margin-bottom:12px">
        <span style="font-size:11px;color:var(--t3)">Click blank to reveal</span>
        <button class="btn" onclick="clozeNav(-1)">Prev</button>
        <span style="font-size:11px;color:var(--t3)" id="cloze-prog"></span>
        <button class="btn" onclick="clozeNav(1)">Next</button>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:16px" id="cloze-area"></div>
    </div>
  </div>
  <div id="panel-quiz" class="panel">
    <div class="scroll-panel">
      <div class="row" style="margin-bottom:4px">
        <span style="font-size:11px;color:var(--t3)">Multiple choice</span>
        <span style="font-size:11px;color:var(--t2);margin-left:auto">Score: <span id="qsc" style="color:#34d399">0</span>/<span id="qtot">0</span></span>
      </div>
      <div class="sbar"><div class="sfill" id="sfill" style="width:0%"></div></div>
      <div id="quiz-area"></div>
      <button class="btn-g btn" onclick="loadQuiz()" style="margin-top:10px">New 5 Questions</button>
    </div>
  </div>
  <div id="panel-mnemonics" class="panel"><div class="scroll-panel"><div class="mg" id="mnem-grid"></div></div></div>
  <div id="panel-compare" class="panel"><div class="scroll-panel"><div class="cg" id="cmp-grid"></div><div class="cvbox" id="conv-box"></div></div></div>
  <div id="panel-timeline" class="panel"><div class="scroll-panel"><div class="tl" id="timeline"></div></div></div>
</div>
<script>
const C={
  domain:{bg:'#1a1535',bd:'#7c3aed',t:'#a78bfa'},
  protist:{bg:'#0a2030',bd:'#0284c7',t:'#38bdf8'},
  fungi:{bg:'#2a1500',bd:'#c2410c',t:'#fb923c'},
  plant:{bg:'#052010',bd:'#15803d',t:'#4ade80'},
  animal:{bg:'#0a1535',bd:'#1d4ed8',t:'#60a5fa'},
  invert:{bg:'#2a0a15',bd:'#be123c',t:'#fb7185'},
  fish:{bg:'#0a1a28',bd:'#0369a1',t:'#38bdf8'},
  amphi:{bg:'#0f2000',bd:'#4d7c0f',t:'#a3e635'},
  reptile:{bg:'#251200',bd:'#b45309',t:'#fbbf24'},
  bird:{bg:'#200828',bd:'#9d174d',t:'#e879f9'},
  mammal:{bg:'#1a1200',bd:'#b45309',t:'#fbbf24'},
  monotreme:{bg:'#201500',bd:'#92400e',t:'#fcd34d'},
  marsupial:{bg:'#1a1500',bd:'#78350f',t:'#fde68a'},
  placental:{bg:'#0a1a10',bd:'#065f46',t:'#34d399'},
  carnivora:{bg:'#200a10',bd:'#9f1239',t:'#fb7185'},
  artiodact:{bg:'#0a1800',bd:'#166534',t:'#86efac'},
  perisso:{bg:'#1a0a20',bd:'#6b21a8',t:'#c4b5fd'},
  cetacea:{bg:'#0a1a28',bd:'#075985',t:'#7dd3fc'},
  rodentia:{bg:'#1a1200',bd:'#713f12',t:'#fcd34d'},
  primates:{bg:'#0a0a20',bd:'#3730a3',t:'#818cf8'},
  hominid:{bg:'#0a0818',bd:'#4c1d95',t:'#c4b5fd'},
  human:{bg:'#200818',bd:'#9d174d',t:'#f472b6'},
  path:{bg:'#0a2018',bd:'#065f46',t:'#34d399'},
};

const N={
  bacteria:{name:'Bacteria',common:'Bacteria (Prokaryotes)',ck:'domain',path:false,sub:'No nucleus, no organelles',ex:'E. coli, Lactobacillus (yogurt), Salmonella, Cyanobacteria',notes:'Single-celled prokaryotes. Most diverse life on Earth by number.',key:'First life ~3.8 bya. No nucleus = prokaryote.'},
  archaea:{name:'Archaea',common:'Ancient Extreme-Environment Microbes',ck:'domain',path:false,sub:'Genetically closer to Eukarya than to Bacteria',ex:'Methanogens (swamp gas), Halophiles (salt flats), Thermophiles (hot springs)',notes:'Look like bacteria but genetically closer to Eukarya.',key:'Archaea are genetically CLOSER to us than to Bacteria!'},
  eukarya:{name:'Domain Eukarya',common:'All Complex Life (Plants, Animals, Fungi, Protists)',ck:'path',path:true,sub:'True membrane-bound nucleus',ex:'All plants, animals, fungi, protists',notes:'Cells with a true nucleus and organelles. All complex life.',key:'OUR domain. Nucleus protects DNA in its own compartment.'},
  protista:{name:'Kingdom Protista',common:'Protists / Algae / Microbes',ck:'protist',path:false,sub:'Mostly single-celled eukaryotes',ex:'Amoeba, Paramecium, Euglena, Nori (sushi seaweed), Kelp, Volvox',notes:'Diverse catch-all kingdom. Mostly single-celled.',key:'Green algae (Chlorophyta) = direct ancestors of ALL land plants!'},
  fungi:{name:'Kingdom Fungi',common:'Fungi / Mushrooms / Molds / Yeasts',ck:'fungi',path:false,sub:'Chitin walls, absorb nutrients by decomposing',ex:"Baker's yeast (bread), Penicillium (antibiotic), Portobello mushroom, Morel, Black bread mold",notes:'Break down organic matter. Chitin cell walls.',key:'Fungi are MORE closely related to animals than to plants!'},
  plantae:{name:'Kingdom Plantae',common:'Plants',ck:'plant',path:false,sub:'Photosynthetic, cellulose cell walls',ex:'Peat moss, Boston fern, Giant sequoia, Ginkgo biloba, Sunflower, Apple tree, Rice',notes:'Photosynthetic multicellular eukaryotes.',key:'Angiosperms (flowering plants) = ~300,000 species, most dominant today.'},
  nonvasc:{name:'Non-vascular Plants',common:'Mosses / Liverworts / Hornworts',ck:'plant',path:false,sub:'Bryophyta, no internal water pipes',ex:'Peat moss (Sphagnum), Liverworts, Hornworts',notes:'No internal water-conducting tissue. Absorb water like sponges.',key:'First colonizers of land ~470 mya. Most primitive land plants.'},
  seedlessvask:{name:'Seedless Vascular',common:'Ferns / Horsetails / Clubmosses',ck:'plant',path:false,sub:'Have pipes, but reproduce by spores not seeds',ex:'Boston fern, Maidenhair fern, Giant horsetail, Clubmoss',notes:'Internal vascular tissue but reproduce via spores.',key:'Dominated Earth 350 mya -- coal swamp forests we burn as fossil fuels today!'},
  gymno:{name:'Gymnosperms',common:'Conifers / Pines / Ginkgo / Cycads',ck:'plant',path:false,sub:'Naked seeds exposed on cones',ex:'Scots pine, Spruce (Christmas tree), Giant sequoia, Ginkgo biloba (living fossil), Sago palm',notes:'Seeds exposed on cone scales. No fruit.',key:'Gymno = naked seeds. Dominated land before flowering plants evolved.'},
  angio:{name:'Angiosperms',common:'Flowering Plants',ck:'plant',path:false,sub:'Seeds enclosed inside flowers and fruits',ex:'Sunflower, Apple, Rose, Corn, Rice, Orchid, Oak, Tomato, Grass',notes:'Flowers attract pollinators. Seeds protected inside fruits.',key:'Most successful land plants. ~300,000 species. Every grain of rice is one!'},
  animalia:{name:'Kingdom Animalia',common:'Animals',ck:'animal',path:true,sub:'Multicellular, heterotrophic, no cell walls',ex:'Sponges, jellyfish, worms, insects, fish, frogs, lizards, birds, mammals',notes:'Multicellular heterotrophs. No cell walls. Develop from embryos.',key:'OUR kingdom. ~8.7 million animal species estimated.'},
  porifera:{name:'Phylum Porifera',common:'Sponges',ck:'invert',path:false,sub:'No true tissues, no organs, filter feeders',ex:'Barrel sponge, Glass sponge (Venus flower basket), Bath sponge',notes:'Most primitive animals. No nervous system, no muscles.',key:'No brain, no muscles, no organs. Most primitive animals alive today.'},
  cnidaria:{name:'Phylum Cnidaria',common:'Jellyfish / Corals / Sea Anemones',ck:'invert',path:false,sub:'Stinging nematocysts, radial symmetry',ex:'Moon jellyfish, Sea anemone, Brain coral, Box jellyfish (deadly), Portuguese man-o-war',notes:'Radial symmetry, stinging cells, 2 tissue layers.',key:'First animals with TRUE tissues. Radial not bilateral like us.'},
  bilateria:{name:'Bilateria',common:'Bilateral Animals (All Higher Animals)',ck:'path',path:true,sub:'Left-right + front-back symmetry',ex:'All worms, insects, fish, amphibians, reptiles, birds, mammals',notes:'Front/back + left/right symmetry. Our ancestral lineage branches here.',key:'KEY milestone. Enables directional movement + brain at front (cephalization).'},
  protostomia:{name:'Protostomia',common:'Mouth-First Invertebrates (NOT our lineage)',ck:'invert',path:false,sub:'Mouth forms FIRST in embryo',ex:'Earthworms, snails, octopuses, spiders, beetles, crabs',notes:'NOT our lineage. Mouth before anus in embryo. ~80% of all animal species.',key:'Includes ~80% of animal species. Lophotrochozoa + Ecdysozoa subgroups.'},
  deuterostomia:{name:'Deuterostomia',common:'Anus-First Animals (Our Group!)',ck:'path',path:true,sub:'Anus forms FIRST in embryo',ex:'Starfish, sea urchins, tunicates, all vertebrates',notes:'OUR lineage. Anus forms before mouth in embryo development.',key:'Deutero=second, stoma=mouth. Anus FIRST -- strange but unforgettable!'},
  lophot:{name:'Lophotrochozoa',common:'Flatworms + Segmented Worms + Mollusks',ck:'invert',path:false,sub:'Soft complex protostome invertebrates',ex:'Planarians, tapeworms, earthworms, leeches, snails, clams, octopuses',notes:'Soft-bodied complex invertebrates. Protostome subgroup.',key:'Mollusca here: octopus = most intelligent invertebrate (3 hearts, blue blood)!'},
  ecdysozoa:{name:'Ecdysozoa',common:'Molting Animals (Insects / Spiders / Crabs)',ck:'invert',path:false,sub:'Shed exoskeleton (ecdysis) to grow',ex:'Roundworms, spiders, scorpions, centipedes, crabs, beetles, flies',notes:'Exoskeleton/cuticle shed to grow. Protostome subgroup.',key:'~80% of all animal species are ecdysozoans!'},
  platyhel:{name:'Platyhelminthes',common:'Flatworms (Tapeworms / Planarians)',ck:'invert',path:false,sub:'Flat body, no circulatory or respiratory system',ex:'Marine planarian, Tapeworm (intestinal parasite), Liver fluke, Planaria (can regenerate!)',notes:'Flat bodies. No blood. Absorb oxygen through skin.',key:'No blood, no lungs. Tapeworms can grow to 10m inside intestines!'},
  annelida:{name:'Annelida',common:'Segmented Worms (Earthworms / Leeches)',ck:'invert',path:false,sub:'Ringed segments, true circulatory system',ex:'Earthworm, Medicinal leech, Polychaete worm (sea bristle worm)',notes:'Ringed segmented bodies. First animals with true circulatory system.',key:'Earthworms aerate soil -- critical for all agriculture. Leeches still used medically.'},
  mollusca:{name:'Mollusca',common:'Mollusks (Snails / Clams / Octopus / Squid)',ck:'invert',path:false,sub:'Soft body, many with calcium shells',ex:'Garden snail, Giant clam, Common octopus, Giant squid, Nautilus, Oyster, Abalone',notes:'Soft body, many secrete calcium shells. Highly diverse.',key:'Octopus = most intelligent invertebrate. 3 hearts, blue blood, 8 arms, camouflage!'},
  nematoda:{name:'Nematoda',common:'Roundworms',ck:'invert',path:false,sub:'Unsegmented microscopic roundworms',ex:'C. elegans (genetics model), Hookworm (parasite), Vinegar eel, Roundworm (Ascaris)',notes:'Unsegmented roundworms. Astronomically numerous.',key:'~1 trillion per m2 of soil. Most abundant animals on Earth by number.'},
  arthropoda:{name:'Phylum Arthropoda',common:'Arthropods (Insects / Spiders / Crabs)',ck:'invert',path:false,sub:'Jointed legs + segmented exoskeleton',ex:'Spiders, scorpions, centipedes, crabs, lobsters, beetles, butterflies, flies, bees',notes:'Jointed legs, segmented body, hard exoskeleton. Largest phylum.',key:'~1 million insect species described. Most diverse animal phylum on Earth.'},
  chelicerata:{name:'Chelicerata',common:'Spiders / Scorpions / Ticks / Horseshoe Crabs',ck:'invert',path:false,sub:'8 legs, no antennae, chelicerae (fangs/pincers)',ex:'Black widow spider, Emperor scorpion, Deer tick, Horseshoe crab, House dust mite',notes:'8 legs, no antennae. Chelicerae = modified feeding appendages.',key:'Horseshoe crab = living fossil 450 mya. Blue blood used to test drug safety!'},
  myriapoda:{name:'Myriapoda',common:'Centipedes / Millipedes',ck:'invert',path:false,sub:'1 pair per segment = centipede; 2 pairs = millipede',ex:'Yellow-legged centipede (predator), Giant African millipede (decomposer), Stone centipede',notes:'Centipedes = predators (1 pair legs/segment). Millipedes = decomposers (2 pairs).',key:'Key ID: 1 pair per segment = centipede (predator). 2 pairs = millipede (decomposer).'},

function renderTree(){
  let h='';
  ROWS.forEach(row=>{
    const nodes=row.ids.map(id=>({id,...N[id]})).filter(n=>n.name);
    if(!nodes.length)return;
    h+=`<div class="level-label">${row.r}</div><div class="node-row">`;
    nodes.forEach(n=>{
      const c=C[n.ck]||C.animal;
      let badge=n.id==='sapiens'?'<div class="tn-you">YOU ARE HERE!</div>':n.path?'<div class="tn-path">your lineage</div>':'';
      h+=`<div class="tnode" id="tn-${n.id}" style="background:${c.bg};border-color:${c.bd};color:${c.t}" onclick="showDetail('${n.id}')">

        <div class="tn-common">${n.common}</div>
        <div class="tn-ex">${(n.ex||'').split(',').slice(0,2).join(',').trim()}...</div>

      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('tree-root').innerHTML=h;
}

let selId=null;
function showDetail(id){
  if(selId){const old=document.getElementById('tn-'+selId);if(old)old.classList.remove('sel');}

  document.getElementById('detail-inner').innerHTML=`

function ansQ(qi,oi,cor,box){
  const b=document.getElementById(box);
  b.querySelectorAll('.qopt').forEach(x=>x.onclick=null);
  b.querySelectorAll('.qopt')[oi].classList.add(oi===cor?'ok':'no');
  b.querySelectorAll('.qopt')[cor].classList.add('ok');
  if(oi===cor)qSc++;qTot++;
  document.getElementById('qsc').textContent=qSc;
  document.getElementById('qtot').textContent=qTot;
  document.getElementById('sfill').style.width=Math.round(qSc/qTot*100)+'%';
}
